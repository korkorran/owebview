<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>D3 chart</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="viz-root">
      <h1 class="chart-title">🌧️ Rainfall <span>(sample data)</span></h1>
      <div id="chart"></div>
    </div>
    <div id="tooltip" class="tooltip" role="status" hidden></div>

    <!-- D3 is vendored locally so the example works offline. -->
    <script src="d3.v7.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
